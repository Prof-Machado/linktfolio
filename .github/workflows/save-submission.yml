name: Save Form Submission

# 1️⃣ Gatilho: repository_dispatch com tipo 'new_submission'
on:
  repository_dispatch:
    types: [new_submission]

jobs:
  save_submission:
    runs-on: ubuntu-latest

    steps:
      # 2️⃣ Faz checkout da branch 'submissions'
      - name: Checkout submissions branch
        uses: actions/checkout@v4
        with:
          ref: submissions

      # 3️⃣ Configura Node.js para manipular JSON
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      # 4️⃣ Carrega ou cria submissions.json
      - name: Load existing submissions
        run: |
          mkdir -p data
          if [ -f submissions.json ]; then
            cp submissions.json data/submissions.json
          else
            echo "[]" > data/submissions.json
          fi

      # 5️⃣ Adiciona o novo envio
      - name: Add new submission
        run: |
          echo '${{ github.event.client_payload }}' > new.json
          node -e "
            const fs = require('fs');
            const submissions = JSON.parse(fs.readFileSync('data/submissions.json'));
            const newSubmission = JSON.parse(fs.readFileSync('new.json'));
            submissions.push(newSubmission);
            fs.writeFileSync('data/submissions.json', JSON.stringify(submissions, null, 2));
          "

      # 6️⃣ Commit e push do JSON atualizado
      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add data/submissions.json
          git commit -m "Add new submission from ${{ github.event.client_payload.name }}" || echo "No changes to commit"
          git push origin submissions
