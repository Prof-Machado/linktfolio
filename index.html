<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <!-- ===================================================== -->

<body>

  <!-- ===================================================== -->
  <!-- CAMADA 1: GIF DE FUNDO                               -->
  <!-- ===================================================== -->
  <!--
    Camada base animada:
    - Ocupa 100% da tela
    - Fica acima do fundo escuro
    - Fica abaixo do overlay e conteúdo
  -->
  <div class="bg-gif"></div>

  <!-- ===================================================== -->
  <!-- CAMADA 2: OVERLAY (ESCURECIMENTO + BLUR)              -->
  <!-- ===================================================== -->
  <!--
    Camada intermediária:
    - Aplica escurecimento (melhora leitura)
    - Aplica blur (efeito moderno tipo glass)
    - NÃO bloqueia cliques
  -->
  <div class="bg-overlay"></div>


  <!-- ===================================================== -->
  <!-- CAMADA 3: CONTEÚDO PRINCIPAL                          -->
  <!-- ===================================================== -->
  <div class="container">

    <!-- PERFIL -->
    <div class="profile">
      <img src="assets/foto-perfil.png" alt="Foto Perfil" class="profile-img">

      <h1>MACHADO, M. Y. M.</h1>

      <p>Scientific and Laboratory Technical Support</p>
      <p>UFPA</p>



      <div class="divider"></div>
    </div>

<br>

    <!-- LINKS -->
    <div class="links">
      <a href="http://lattes.cnpq.br/3291431101358065" target="_blank">
        <img src="assets/lattes.png">
      </a>
      <a href="https://www.linkedin.com/in/profmachado/" target="_blank">
        <img src="assets/linkedin.png">
      </a>
      <a href="https://github.com/Prof-Machado" target="_blank">
        <img src="assets/github.png">
      </a>

      </a>
    </div>


<br>



    <!-- FORMULÁRIO -->
    <div class="contact">
      <h2>Contact for Collaborations and Projects:</h2>

      <form id="contactForm">
        <input type="text" name="name" placeholder="Name" required>
        <input type="email" name="email" placeholder="E-mail" rows="1" required>
        <textarea name="message" placeholder="Text" rows="2" required></textarea>

        <div class="terms">
          <input type="checkbox" id="terms" required>
          <label for="terms">Accept terms of use</label>
        </div>

        <button type="submit">submit</button>
      </form>
    </div>
